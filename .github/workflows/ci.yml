name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Check lockfile is in sync with package.json
        if: github.event_name == 'pull_request'
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          git fetch --depth=2 origin "$BASE" "$HEAD"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          if echo "$CHANGED" | grep -q '^package\.json$'; then
            if ! echo "$CHANGED" | grep -q '^package-lock\.json$'; then
              echo "::error::package.json was changed but package-lock.json was not updated. Run 'npm install' and commit the updated lockfile."
              exit 1
            fi
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Run production build
        run: npm run build
